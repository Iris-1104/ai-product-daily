name: Publish AI Product Daily

on:
  schedule:
    # GitHub Actions uses UTC. 03:00 UTC = 11:00 Asia/Shanghai.
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: ai-product-daily-publish
  cancel-in-progress: false

jobs:
  generate:
    name: Research and generate daily issue
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies before exposing the AI credential
        run: npm ci

      - name: Generate today's issue with Codex
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/daily-publish.md
          model: gpt-5.6-sol
          effort: high
          sandbox: workspace-write
          safety-strategy: drop-sudo
          # codex-action forwards these arguments to `codex exec`. Live search
          # is therefore enabled through a config override rather than the
          # top-level-only `--search` flag.
          codex-args: '["-c", "web_search=\"live\"", "--ephemeral"]'
          output-file: ${{ runner.temp }}/codex-output.md

      - name: Upload Codex report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codex-daily-report
          path: ${{ runner.temp }}/codex-output.md
          if-no-files-found: ignore
          retention-days: 14

      - name: Restrict the generated change to daily content
        shell: bash
        run: |
          changed_files="$(git status --porcelain=v1 | cut -c4-)"
          if [ -z "$changed_files" ]; then
            echo "Codex did not produce a daily content change."
            exit 1
          fi
          if [ "$changed_files" != "content/issues.js" ]; then
            echo "Unexpected files changed:"
            printf '%s\n' "$changed_files"
            exit 1
          fi

      - name: Create content-only patch
        shell: bash
        run: git diff --binary HEAD -- content/issues.js > "${RUNNER_TEMP}/daily.patch"

      - name: Upload daily content patch
        uses: actions/upload-artifact@v4
        with:
          name: daily-content-patch
          path: ${{ runner.temp }}/daily.patch
          if-no-files-found: error
          retention-days: 2

  publish:
    name: Validate and publish
    needs: generate
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Download generated content
        uses: actions/download-artifact@v4
        with:
          name: daily-content-patch
          path: ${{ runner.temp }}

      - name: Apply generated content
        run: git apply --index "${RUNNER_TEMP}/daily.patch"

      - name: Install dependencies
        run: npm ci

      - name: Validate daily issue structure
        env:
          TZ: Asia/Shanghai
        run: node scripts/validate-daily.mjs

      - name: Build production site
        run: npm run build

      - name: Commit and push daily issue
        shell: bash
        env:
          TZ: Asia/Shanghai
        run: |
          issue_date="$(date +%F)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Publish AI Product Daily ${issue_date}"
          git push origin HEAD:main
